server {
    listen 80;
    server_name _;
    client_max_body_size 120m;
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $django_upstream http://web:8000;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/xml image/svg+xml;
    proxy_buffering on;
    proxy_buffers 16 16k;
    proxy_buffer_size 32k;

    location = /metrics { return 404; }
    location = /robots.txt { return 404; }

    location ~* ^/(\.env|\.git|\.idea|\.vscode|\.ftpconfig|\.remote-sync\.json) {
        return 404;
    }

    location ~* ^/(\+CSCOE\+|\+CSCOT\+|AHT|CACHE|EndUserPortal\.jsp|Guest\.aspx|Login(?:\.jsp|/Login)?|Orion/Login\.aspx|RASHTML5Gateway|wsman) {
        return 404;
    }

    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location /media/ {
        return 404;
    }


    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /grafana;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /app/ {
        rewrite ^/app/(.*)$ /$1 break;
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name _;
    client_max_body_size 120m;
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $django_upstream http://web:8000;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location = /metrics { return 404; }
    location = /robots.txt { return 404; }

    location ~* ^/(\.env|\.git|\.idea|\.vscode|\.ftpconfig|\.remote-sync\.json) {
        return 404;
    }

    location ~* ^/(\+CSCOE\+|\+CSCOT\+|AHT|CACHE|EndUserPortal\.jsp|Guest\.aspx|Login(?:\.jsp|/Login)?|Orion/Login\.aspx|RASHTML5Gateway|wsman|WebInterface/login\.html|_layouts/15/error\.aspx|admin(?:_login\.html)?|api/v2/cmdb/system/admin(?:/admin)?|appliance|auth(?:\.html|/admin(?:/master/console/)?)?|authorization\.do|cgi-bin/welcome|cgi-mod/index\.cgi) {
        return 404;
    }

    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location /media/ {
        return 404;
    }


    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /grafana;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /app/ {
        rewrite ^/app/(.*)$ /$1 break;
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

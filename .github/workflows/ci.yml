name: Local CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: blog
          POSTGRES_USER: blog
          POSTGRES_PASSWORD: StrongPass123!
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run migrations
      run: |
        python manage.py makemigrations
        python manage.py migrate
      env:
        DB_NAME: blog
        DB_USER: blog
        DB_PASSWORD: StrongPass123!
        DB_HOST: localhost
        DB_PORT: 5432

    - name: Run tests
      run: |
        python manage.py test
      env:
        DB_NAME: blog
        DB_USER: blog
        DB_PASSWORD: StrongPass123!
        DB_HOST: localhost
        DB_PORT: 5432
        DEBUG: False
        ALLOWED_HOSTS: localhost,127.0.0.1
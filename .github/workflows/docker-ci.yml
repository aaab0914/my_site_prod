name: Docker CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-compose-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          cat > .env <<EOF
          SECRET_KEY=ci-secret-key
          DEBUG=False
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_NAME=my_site_db
          DB_USER=my_site_user
          DB_PASSWORD=StrongPass123!
          DB_HOST=db
          DB_PORT=5432
          EOF

      - name: Audit Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build containers
        run: docker compose build

      - name: Scan image and filesystem with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Start stack
        run: docker compose up -d

      - name: Wait for web health
        run: |
          for i in {1..24}; do
            status="$(docker inspect --format='{{json .State.Health.Status}}' "$(docker compose ps -q web)" 2>/dev/null || true)"
            if [ "$status" = "\"healthy\"" ]; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          docker compose logs web nginx db
          exit 1

      - name: Run Django test suite in container
        run: docker compose exec -T web python manage.py test

      - name: Verify nginx endpoint
        run: |
          curl --fail --retry 10 --retry-delay 3 http://127.0.0.1/blog/

      - name: Run health monitor probe
        run: docker compose exec -T web python /code/monitor_health.py

      - name: Validate production compose config
        run: docker compose -f docker-compose.prod.yml config

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v

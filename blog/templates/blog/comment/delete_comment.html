{% extends 'blog/base.html' %}

{% block title %}Comment Delete Confirm{% endblock title %}

{% block content %}
<h1>Are you sure want to delete this Comment?</h1>

<div class="module">
    <form action="" method="post">
        {% csrf_token %}
        <input type="submit" value="Confirm">
    </form>
</div>

<p>
    <a href="{% url 'blog:post_detail' comment.post.publish.year comment.post.publish.month comment.post.publish.day comment.post.slug %}">Cancel</a>
</p>

{% endblock content %}

{% extends 'blog/base.html' %}

{% block title %}
Register
{% endblock title %}

{% block content %}
  <div style="max-width: 400px; margin: 40px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;
background: #f9f9f9;">
    <h2 style="text-align: center; margin-bottom: 20px">
        Register
    </h2>

    <form method="post">
      {% csrf_token %}
      {{ form.as_div }}
      <button type="submit" style="width: 100%; padding: 10px; background: #00abff;
color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;">
          Sign Up
      </button>
    </form>

{#    <p style="text-align: center; margin-top: 15px">#}
{#        Already have an account?#}
{#        #}
{#    </p>#}

  </div>
{% endblock content %}

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: my-site-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: my-site-logs
          host: rgavanp
          __path__: /var/www/my_site_prod_repo_new/logs/**/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<level>[A-Z]+) (?P<ts>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d+) (?P<module>\S+) (?P<process>\d+) (?P<thread>\d+) (?P<message>.*)$'
      - labels:
          level:
          module:
      - timestamp:
          source: ts
          format: '2006-01-02 15:04:05,000'
          location: UTC

  - job_name: backup-log
    static_configs:
      - targets: [localhost]
        labels:
          job: backup-log
          host: rgavanp
          __path__: /var/www/my_site_prod_repo_new/logs/backup.log

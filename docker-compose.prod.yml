services:
  db:
    image: postgres:16
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    restart: always
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms192m -Xmx192m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  web:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: my_site.settings.prod
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE}
      RUNNING_IN_DOCKER: "true"
    volumes:
      - ./staticfiles:/code/staticfiles
      - ./media:/code/media
      - backups_volume:/code/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nclass NoRedirect(urllib.request.HTTPRedirectHandler):\n    def redirect_request(self, req, fp, code, msg, headers, newurl):\n        return None\nopener = urllib.request.build_opener(NoRedirect)\nreq = urllib.request.Request('http://127.0.0.1:8000/users/login/', headers={'X-Forwarded-Proto': 'https', 'Host': 'localhost'})\nresponse = opener.open(req, timeout=15)\nprint(response.status)\nPY"]
      interval: 15s
      timeout: 15s
      start_period: 30s
      retries: 8

  celery:
    build: .
    restart: always
    env_file:
      - .env
    command: celery -A my_site worker -l info -E --concurrency=1
    environment:
      DJANGO_SETTINGS_MODULE: my_site.settings.prod
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE}
      RUNNING_IN_DOCKER: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery-beat:
    build: .
    restart: always
    env_file:
      - .env
    command: celery -A my_site beat -l info
    environment:
      DJANGO_SETTINGS_MODULE: my_site.settings.prod
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE}
      RUNNING_IN_DOCKER: "true"
    depends_on:
      redis:
        condition: service_started

  flower:
    profiles: ["optional"]
    build: .
    restart: always
    env_file:
      - .env
    command: celery -A my_site flower --port=5555 
    environment:
      DJANGO_SETTINGS_MODULE: my_site.settings.prod
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE}
      RUNNING_IN_DOCKER: "true"
    ports:
      - "127.0.0.1:15555:5555"
    depends_on:
      redis:
        condition: service_started
      celery:
        condition: service_started

  prometheus:
    profiles: ["optional"]
    image: prom/prometheus:v2.54.1
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.external-url=https://rgavanp.kdns.fr/prometheus/"
      - "--web.route-prefix=/"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:19090:9090"
    depends_on:
      web:
        condition: service_started

  grafana:
    profiles: ["optional"]
    image: grafana/grafana:11.1.4
    restart: always
    environment:
      GF_SERVER_ROOT_URL: https://rgavanp.kdns.fr/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    ports:
      - "127.0.0.1:13000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started

  celery-exporter:
    profiles: ["optional"]
    image: danihodovic/celery-exporter:0.11.0
    restart: always
    command:
      - "--broker-url=${CELERY_BROKER_URL}"
      - "--port=9540"
    ports:
      - "127.0.0.1:19540:9540"
    depends_on:
      redis:
        condition: service_started

  nginx:
    profiles: ["optional"]
    image: nginx:1.25
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/static:ro
      - ./media:/media:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  backups_volume:
  elasticsearch_data:
  grafana_data:

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my_site 导航</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
            color: #222;
        }
        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 40px 24px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
        }
        h1 {
            margin-top: 0;
            font-size: 36px;
            text-align: center;
        }
        p {
            text-align: center;
            color: #555;
            line-height: 1.6;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 32px;
        }
        .button {
            display: block;
            padding: 14px 18px;
            border-radius: 12px;
            background: #00abff;
            color: #fff;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .button:hover {
            background: #0088cc;
            transform: translateY(-2px);
        }
        .section-title {
            margin-top: 36px;
            font-size: 20px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>my_site 项目导航</h1>
        <p>这个页面提供项目常用入口，方便快速跳转到博客、用户系统、音频功能和后台管理页面。</p>

        <div class="grid">
            <a class="button" href="/blog/">Blog</a>
            <a class="button" href="/users/login/">Login</a>
            <a class="button" href="/users/register/">Register</a>
            <a class="button" href="/users/profile/">Profile</a>
        </div>

        <div class="section-title">内容管理</div>
        <div class="grid">
            <a class="button" href="/blog/create/">Create Post</a>
            <a class="button" href="/blog/search/">Search Posts</a>
            <a class="button" href="/blog/audio/upload/">Upload Audio</a>
            <a class="button" href="/blog/audio/list/">Audio List</a>
        </div>

        <div class="section-title">系统入口</div>
        <div class="grid">
            <a class="button" href="/admin/">Admin</a>
            <a class="button" href="/sitemap.xml">Sitemap</a>
            <a class="button" href="/blog/feed/">Blog Feed</a>
            <a class="button" href="/markdownx/">MarkdownX</a>
        </div>
    </div>
</body>
</html>

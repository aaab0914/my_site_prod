services:
  db:
    image: postgres:16
    restart: always
    env_file:
      - .env.dev
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5550:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    restart: always
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms192m -Xmx192m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  web:
    build: .
    restart: always
    env_file:
      - .env.dev
    environment:
      DJANGO_SETTINGS_MODULE: my_site.settings.dev
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE}
      RUNNING_IN_DOCKER: "true"
    volumes:
      - .:/code
      - ./staticfiles:/code/staticfiles
      - ./media:/code/media
      - ./logs:/code/logs
      - ./backups:/code/backups
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nclass NoRedirect(urllib.request.HTTPRedirectHandler):\n    def redirect_request(self, req, fp, code, msg, headers, newurl):\n        return None\nopener = urllib.request.build_opener(NoRedirect)\nreq = urllib.request.Request('http://127.0.0.1:8000/users/login/', headers={'X-Forwarded-Proto': 'https', 'Host': 'localhost'})\nresponse = opener.open(req, timeout=15)\nprint(response.status)\nPY"]
      interval: 15s
      timeout: 15s
      start_period: 30s
      retries: 8

  celery:
    build: .
    restart: always
    env_file:
      - .env.dev
    command: celery -A my_site worker -l info -E --concurrency=1
    environment:
      DJANGO_SETTINGS_MODULE: my_site.settings.dev
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE}
      RUNNING_IN_DOCKER: "true"
    volumes:
      - .:/code
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport socket\nimport subprocess\nhost = socket.gethostname()\nresult = subprocess.run(['celery', '-A', 'my_site', 'inspect', 'ping', '-d', f'celery@{host}'], capture_output=True, text=True, timeout=20)\noutput = f'{result.stdout}\\n{result.stderr}'\nraise SystemExit(0 if result.returncode == 0 and 'pong' in output else 1)\nPY"]
      interval: 30s
      timeout: 25s
      start_period: 40s
      retries: 3

  celery-beat:
    build: .
    restart: always
    env_file:
      - .env.dev
    command: celery -A my_site beat -l info
    environment:
      DJANGO_SETTINGS_MODULE: my_site.settings.dev
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE}
      RUNNING_IN_DOCKER: "true"
    volumes:
      - .:/code
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nfrom pathlib import Path\ncmdline = Path('/proc/1/cmdline').read_text(encoding='utf-8', errors='ignore').replace('\\x00', ' ')\nraise SystemExit(0 if 'celery' in cmdline and 'beat' in cmdline else 1)\nPY"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  postgres_data:
  elasticsearch_data:
